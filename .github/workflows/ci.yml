name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  generate-ssl:
    runs-on: ubuntu-latest
    outputs: {}
    steps:
      - uses: actions/checkout@v5

      - name: Generate SSL certs
        run: bash scripts/generate-ssl.sh

      - name: Upload certs artifact
        uses: actions/upload-artifact@v4
        with:
          name: certs
          path: .certs/*

  lint-and-build:
    needs: generate-ssl
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm --workspace server run prisma:generate
        
      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm --workspace client run build

      - name: Build server
        run: npm --workspace server run build

  integration_test:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v5

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Create .env file
          run: |
            echo "DOCKERFILE=Dockerfile.dev" >> .env
            echo "NGINX_CONF=nginx.dev.conf" >> .env
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=postgres" >> .env
            echo "POSTGRES_DB=app" >> .env
            echo "EXTERNAL_PORT=8443" >> .env

        - name: Build and start containers
          run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up  --build -d

        - name: Wait for containers to be healthy
          run: |
            echo "Waiting for containers..."
            timeout 120 bash -c 'until curl -sf https://localhost:8443/health; do sleep 2; done'
            echo "Containers are ready"

        - name: Check all containers are running
          run: |
              if docker compose ps --all | grep -E "Exit|exited"; then
                echo "Some containers exited unexpectedly"
                exit 1
              fi

        - name: Check nginx is responding
          run: curl -f --insecure https://localhost:8443

        - name: Check server is responding
          run: curl -f --insecure https://localhost:8443/health

        - name: Run integration tests
          run: npm run test

        - name: Show logs on failure
          if: failure()
          run: docker compose logs

        - name: Stop containers
          if: always()
          run: docker compose down -v

  docker:
      needs: generate-ssl
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v5

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Create .env file
          run: |
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=postgres" >> .env
            echo "POSTGRES_DB=app" >> .env
            echo "EXTERNAL_PORT=8443" >> .env

        - name: Build and start containers
          run: docker compose up --build -d

        - name: Wait for containers to be healthy
          run: |
            echo "Waiting for containers..."
            timeout 120 bash -c 'until curl -sf https://localhost:8443/health; do sleep 2; done'
            echo "Containers are ready"

        - name: Check all containers are running
          run: |
              if docker compose ps --all | grep -E "Exit|exited"; then
                echo "Some containers exited unexpectedly"
                exit 1
              fi

        - name: Check nginx is responding
          run: curl -f --insecure https://localhost:8443

        - name: Check server is responding
          run: curl -f --insecure https://localhost:8443/health

        - name: Show logs on failure
          if: failure()
          run: docker compose logs

        - name: Stop containers
          if: always()
          run: docker compose down -v
