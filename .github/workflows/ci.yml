name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm --workspace client run build

      - name: Build server
        run: npm --workspace server run build

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npm --workspace server run prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app

      - name: Run tests
        run: npm --workspace server run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app

  docker:
      runs-on: ubuntu-latest
  
      steps:
        - uses: actions/checkout@v4
  
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
  
        - name: Cache client layers
          uses: actions/cache@v4
          with:
            path: /tmp/.buildx-cache-client
            key: buildx-client-${{ hashFiles('client/package*.json', 'client/Dockerfile.prod') }}
            restore-keys: buildx-client-
  
        - name: Cache server layers
          uses: actions/cache@v4
          with:
            path: /tmp/.buildx-cache-server
            key: buildx-server-${{ hashFiles('server/package*.json', 'server/Dockerfile.prod') }}
            restore-keys: buildx-server-
  
        - name: Create .env file
          run: |
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=postgres" >> .env
            echo "POSTGRES_DB=app" >> .env
            echo "DOCKERFILE=Dockerfile.prod" >> .env
            echo "CLIENT_PORT=80" >> .env
            echo "NGINX_CONF=nginx.prod.conf" >> .env
  
        - name: Build and start containers
          run: docker compose up --build -d
  
        - name: Wait for containers to be healthy
          run: |
            echo "Waiting for containers..."
            timeout 120 bash -c 'until curl -sf http://localhost:8080; do sleep 2; done'
            echo "Containers are ready"
  
        - name: Check all containers are running
          run: |
              if docker compose ps --all | grep -E "Exit|exited"; then
                echo "Some containers exited unexpectedly"
                exit 1
              fi
  
        - name: Check nginx is responding
          run: curl -f http://localhost:8080
          #run: curl -f --insecure https://localhost:8080
  
        - name: Check server is responding
          run: curl -f http://localhost:8080/server/hello
          #run: curl -f --insecure https://localhost:8080/server/hello
  
        - name: Show logs on failure
          if: failure()
          run: docker compose logs
  
        - name: Stop containers
          if: always()
          run: docker compose down -v          
