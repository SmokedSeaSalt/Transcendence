events {}

http {
    upstream client {
        server client:80;
    }

    upstream server {
        server server:8000;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://server;
        }

        location /server/ {
            proxy_pass http://server;
        }

        location / {
            proxy_pass http://client;
        }
    }
}