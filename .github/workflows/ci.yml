name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm --workspace client run build

      - name: Build server
        run: npm --workspace server run build

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      # - name: Generate database
      #   run: npm --workspace server run prisma:generate
      #   env:
      #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app

      # - name: Run migrations
      #   run: npm --workspace server run prisma:migrate:deploy
      #   env:
      #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app

      - name: Run tests
        run: npm run test
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app

  docker:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v5

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Create .env file
          run: |
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=postgres" >> .env
            echo "POSTGRES_DB=app" >> .env
            echo "EXTERNAL_PORT=8080" >> .env

        - name: Build and start containers
          run: docker compose up --build -d

        - name: Wait for containers to be healthy
          run: |
            echo "Waiting for containers..."
            timeout 120 bash -c 'until curl -sf http://localhost:8080/health; do sleep 2; done'
            echo "Containers are ready"

        - name: Check all containers are running
          run: |
              if docker compose ps --all | grep -E "Exit|exited"; then
                echo "Some containers exited unexpectedly"
                exit 1
              fi

        - name: Check nginx is responding
          run: curl -f http://localhost:8080
          #run: curl -f --insecure https://localhost:8080

        - name: Check server is responding
          run: curl -f http://localhost:8080/health
          #run: curl -f --insecure https://localhost:8080/health

        - name: Show logs on failure
          if: failure()
          run: docker compose logs

        - name: Stop containers
          if: always()
          run: docker compose down -v
