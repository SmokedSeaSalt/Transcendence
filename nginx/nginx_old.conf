events {}

http {
  upstream client {
    server client:5173;
  }

  upstream server {
    server server:8000;
  }

  server {
    listen 80;
    server_name _;

    location /hello {
      proxy_pass http://server;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://client;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

#What was removed and why:

#server_name _ → catch-all for domain names, unnecessary locally
#proxy_http_version 1.1 → only needed for websockets or keepalive, not needed now (add back when you add sockets)
#proxy_set_header Host → tells backend the original host, not needed for local dev
#proxy_set_header X-Real-IP / X-Forwarded-For → passes the client's real IP, not needed until you have auth/logging in production
#proxy_set_header X-Forwarded-Proto → tells backend if request was HTTP/HTTPS, not needed without SSL
#Upgrade / Connection upgrade → websocket headers, add back when you add sockets